name: VinylForAppleTV

options:
  deploymentTarget:
    tvOS: "18.0"
  developmentLanguage: en
  bundleIdPrefix: com.andreisudarikov
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.8.0"

targets:
  VinylForAppleTV:
    type: application
    platform: tvOS
    sources:
      - path: App
      - path: Sources
        excludes:
          - "**/*.example.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andreisudarikov.VinylForAppleTV
        TARGETED_DEVICE_FAMILY: "3"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Vinyl for Apple TV"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_APPICON_NAME: App Icon & Top Shelf Image
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
