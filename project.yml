name: VinylForAppleTV

options:
  deploymentTarget:
    tvOS: "18.0"
  developmentLanguage: en
  bundleIdPrefix: com.andreisudarikov
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.17.2"
    CURRENT_PROJECT_VERSION: "22"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.8.0"

targets:
  VinylForAppleTV:
    type: application
    platform: tvOS
    sources:
      - path: App
      - path: Sources
        excludes:
          - "**/*.example.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andreisudarikov.VinylForAppleTV
        TARGETED_DEVICE_FAMILY: "3"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Vinyl for Apple TV"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_APPICON_NAME: App Icon & Top Shelf Image
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI

  VinylForAppleTVTests:
    type: bundle.unit-test
    platform: tvOS
    sources:
      - path: Tests
    dependencies:
      - target: VinylForAppleTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andreisudarikov.VinylForAppleTVTests
        GENERATE_INFOPLIST_FILE: YES

# Explicit shared scheme so Xcode's UI has something to pick. Without this
# block, XcodeGen 2.45+ marks the targets as `SuppressBuildableAutocreation`
# in xcschememanagement.plist but doesn't write the .xcscheme file, so the
# Xcode UI shows "no schemes to build for" even though xcodebuild on CLI
# can still resolve the target by name.
schemes:
  VinylForAppleTV:
    build:
      targets:
        VinylForAppleTV: all
        VinylForAppleTVTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VinylForAppleTVTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
